<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Paris M. France</title>

  <!-- ✅ CSS GOES HERE -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="navbar-placeholder"></div>

<header class="page-hero">
  <div>
    
    <div class="kicker">Your Cart</div>
    <h1>Cart</h1>
    <p>Review your books before checkout.</p>
  </div>
</header>

<main class="section page-shell">

  <div class="cart-layout">

    <!-- LEFT: ITEMS -->
    <div id="cart-items" class="cart-items"></div>

    <!-- RIGHT: SUMMARY -->
    <div class="cart-summary">
      <h2>Order Summary</h2>

      <div class="summary-row">
        <span>Total</span>
        <span id="cart-total">$0.00</span>
      </div>

      <button class="btn primary checkout-btn" onclick="checkoutCart()">
        Checkout
      </button>
    </div>

  </div>
<script src="script.js"></script>
<script src="script.js"></script>
<script src="navbar.js"></script>
<!-- SUPABASE FIRST -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<!-- THEN YOUR SITE SCRIPTS -->
<script src="script.js"></script>
<script src="navbar.js"></script>
<body>
</main>
